<body class="bg-background text-on-background font-body-base text-body-base antialiased selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-md border-b border-outline-variant/30 flex justify-between items-center px-margin-mobile h-14 md:hidden">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">terminal</span>
<span class="font-mono-label text-mono-label tracking-widest text-primary uppercase">MUNEEB</span>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow pt-24 px-margin-mobile flex flex-col gap-stack-lg max-w-lg mx-auto w-full">
<!-- Header Section -->
<section class="flex flex-col gap-stack-sm">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary">Initiate Contact</h1>
<p class="text-on-surface-variant font-mono-code text-mono-code">// Secure comms channel established. Ready for payload.</p>
</section>
<!-- Form Section -->
<section class="bg-surface-container rounded-xl p-margin-mobile border border-outline-variant/20 shadow-lg relative overflow-hidden">
<!-- Glassmorphism accent -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/10 rounded-full blur-2xl pointer-events-none"></div>
<form class="flex flex-col gap-stack-md relative z-10">
<!-- Name -->
<div class="flex flex-col gap-2">
<label class="font-mono-label text-mono-label text-on-surface-variant uppercase tracking-wider" for="name">Name</label>
<input class="bg-transparent border-b border-outline-variant/50 focus:border-primary focus:ring-0 focus:outline-none py-2 px-0 text-on-surface transition-colors duration-300 font-mono-code text-mono-code placeholder:text-outline-variant/50" id="name" placeholder="John Doe" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-2">
<label class="font-mono-label text-mono-label text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<input class="bg-transparent border-b border-outline-variant/50 focus:border-primary focus:ring-0 focus:outline-none py-2 px-0 text-on-surface transition-colors duration-300 font-mono-code text-mono-code placeholder:text-outline-variant/50" id="email" placeholder="john@example.com" type="email"/>
</div>
<!-- Inquiry Type -->
<div class="flex flex-col gap-2">
<label class="font-mono-label text-mono-label text-on-surface-variant uppercase tracking-wider" for="type">Inquiry Type</label>
<div class="relative">
<select class="w-full bg-surface-container-high border border-outline-variant/30 rounded-lg py-3 px-4 appearance-none text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none font-mono-code text-mono-code" id="type">
<option value="project">New Project</option>
<option value="consulting">Architecture Consulting</option>
<option value="employment">Employment Opportunity</option>
<option value="other">Other</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Details -->
<div class="flex flex-col gap-2">
<label class="font-mono-label text-mono-label text-on-surface-variant uppercase tracking-wider" for="details">Project Details</label>
<textarea class="bg-surface-container-lowest border border-outline-variant/30 rounded-lg p-3 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none resize-none font-mono-code text-mono-code placeholder:text-outline-variant/50" id="details" placeholder="Describe the mission parameters..." rows="4"></textarea>
</div>
<!-- Submit Action -->
<button class="mt-4 bg-primary text-on-primary font-mono-label text-mono-label uppercase tracking-widest py-4 rounded-lg hover:bg-primary-fixed transition-colors duration-300 flex justify-center items-center gap-2 active:scale-95" type="button">
<span>Transmit Payload</span>
<span class="material-symbols-outlined text-sm" data-weight="fill">send</span>
</button>
</form>
</section>
<!-- Social Networks Grid -->
<section class="flex flex-col gap-stack-sm mb-stack-lg">
<h2 class="font-mono-label text-mono-label text-outline-variant uppercase tracking-widest pl-2">Alternative Nodes</h2>
<div class="grid grid-cols-2 gap-unit">
<a class="bg-surface-container-low border border-outline-variant/10 rounded-lg p-4 flex flex-col items-center justify-center gap-2 hover:bg-surface-container hover:border-primary/30 transition-all duration-300 group" href="#">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors text-3xl">code</span>
<span class="font-mono-label text-mono-label text-on-surface">GitHub</span>
</a>
<a class="bg-surface-container-low border border-outline-variant/10 rounded-lg p-4 flex flex-col items-center justify-center gap-2 hover:bg-surface-container hover:border-primary/30 transition-all duration-300 group" href="#">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors text-3xl">work</span>
<span class="font-mono-label text-mono-label text-on-surface">LinkedIn</span>
</a>
<a class="bg-surface-container-low border border-outline-variant/10 rounded-lg p-4 flex flex-col items-center justify-center gap-2 hover:bg-surface-container hover:border-primary/30 transition-all duration-300 group col-span-2" href="#">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors text-2xl">event_available</span>
<span class="font-mono-label text-mono-label text-on-surface">Schedule Meeting</span>
</a>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-full bg-surface-container/90 backdrop-blur-xl border-t border-outline-variant/20 shadow-lg md:hidden flex justify-around items-center h-20 pb-safe px-4">

<span class="font-mono-label text-[10px] uppercase tracking-wider">Home</span>

<span class="material-symbols-outlined mb-1">settings_input_component</span>
<span class="font-mono-label text-[10px] uppercase tracking-wider">Skills</span>
</a>

<span class="material-symbols-outlined mb-1">code</span>
<span class="font-mono-label text-[10px] uppercase tracking-wider">Work</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high active:scale-90 transition-transform duration-150 p-2 rounded-lg w-16" href="#">
<span class="material-symbols-outlined mb-1">school</span>
<span class="font-mono-label text-[10px] uppercase tracking-wider">Grad</span>
</a>
<a class="flex flex-col items-center justify-center text-primary dark:text-primary hover:bg-surface-container-high active:scale-90 transition-transform duration-150 p-2 rounded-lg w-16 relative" href="#">
<!-- Active Indicator Dot -->
<div class="absolute -top-1 w-1 h-1 rounded-full bg-primary animate-pulse"></div>
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">mail</span>
<span class="font-mono-label text-[10px] uppercase tracking-wider font-bold">Mail</span>
</a>
</nav>
